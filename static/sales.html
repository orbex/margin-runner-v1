<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Margin Runner — Sales</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0e1a; --surface: #111827; --card: #1a2236; --border: #1f2a45; --text: #e2e8f0; --text-dim: #8892b0; --green: #00e676; --green-dim: rgba(0,230,118,0.12); --yellow: #fbbf24; --red: #ef4444; --radius: 12px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }
  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; height: 64px; gap: 32px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-weight: 800; font-size: 20px; color: var(--green); }
  .nav-brand small { font-weight: 400; font-size: 13px; color: var(--text-dim); margin-left: 8px; }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a { color: var(--text-dim); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); background: rgba(255,255,255,0.06); }
  .nav-links a.active { color: var(--green); }
  .container { max-width: 1280px; margin: 0 auto; padding: 32px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--text-dim); font-size: 15px; margin-bottom: 32px; }
  .empty-state { text-align: center; padding: 80px 20px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .empty-state p { color: var(--text-dim); font-size: 14px; line-height: 1.6; max-width: 400px; margin: 0 auto; }
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .kpi-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .kpi-card .label { color: var(--text-dim); font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .kpi-card .value { font-size: 28px; font-weight: 700; color: var(--text-dim); }
  table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  th { background: var(--surface); color: var(--text-dim); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .num { text-align: right; font-family: 'Inter', monospace; }
  .loading { text-align: center; padding: 60px; color: var(--text-dim); }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand">⬡ Margin Runner <small>$2k/wk target</small></div>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/buys">Buys</a>
    <a href="/sales" class="active">Sales</a>
    <a href="/scrapers">Scrapers</a>
  </div>
</nav>
<div class="container">
  <h1>Sales</h1>
  <p class="subtitle">Completed sales and revenue tracking.</p>
  <div id="kpi-row" class="kpi-grid"></div>
  <div id="table"><div class="loading">Loading sales...</div></div>
</div>

<script>
function usd(v) { return '$' + Number(v).toFixed(2); }

async function load() {
  const r = await fetch('/api/sales');
  const j = await r.json();
  const sales = j.sales || [];

  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-card"><div class="label">Total Sales</div><div class="value">${sales.length}</div></div>
    <div class="kpi-card"><div class="label">Total Revenue</div><div class="value">${usd(sales.reduce((s,i) => s + (i.sale_price||0), 0))}</div></div>
    <div class="kpi-card"><div class="label">Total Net Profit</div><div class="value">${usd(sales.reduce((s,i) => s + (i.net_profit||0), 0))}</div></div>
  `;

  if (sales.length === 0) {
    document.getElementById('table').innerHTML = `
      <div class="empty-state">
        <div class="icon">📦</div>
        <h3>No sales yet</h3>
        <p>Sales will appear here once you've listed and sold items. Your first batch of deals is ready to go — set up your eBay seller account to start.</p>
      </div>`;
    return;
  }

  let html = '<table><thead><tr><th>Date</th><th>Product</th><th>Sale Price</th><th>Fees</th><th>Shipping</th><th>Net Profit</th></tr></thead><tbody>';
  sales.forEach(s => {
    html += `<tr>
      <td>${s.sale_date || '—'}</td>
      <td>${s.product_name || '—'}</td>
      <td class="num">${usd(s.sale_price)}</td>
      <td class="num">${usd(s.platform_fees)}</td>
      <td class="num">${usd(s.shipping_cost)}</td>
      <td class="num">${usd(s.net_profit)}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('table').innerHTML = html;
}
load();
</script>
</body>
</html>
