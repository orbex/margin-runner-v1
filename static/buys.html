<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Margin Runner — Buys</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0e1a; --surface: #111827; --card: #1a2236; --border: #1f2a45; --text: #e2e8f0; --text-dim: #8892b0; --green: #00e676; --green-dim: rgba(0,230,118,0.12); --yellow: #fbbf24; --red: #ef4444; --radius: 12px; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }
  .nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; height: 64px; gap: 32px; position: sticky; top: 0; z-index: 100; }
  .nav-brand { font-weight: 800; font-size: 20px; color: var(--green); }
  .nav-brand small { font-weight: 400; font-size: 13px; color: var(--text-dim); margin-left: 8px; }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a { color: var(--text-dim); text-decoration: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); background: rgba(255,255,255,0.06); }
  .nav-links a.active { color: var(--green); }
  .container { max-width: 1280px; margin: 0 auto; padding: 32px; }
  h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--text-dim); font-size: 15px; margin-bottom: 32px; }
  .filters { margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; }
  .filters input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 8px; font-size: 14px; width: 280px; font-family: inherit; outline: none; }
  .filters input:focus { border-color: var(--green); }
  table { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  th { background: var(--surface); color: var(--text-dim); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
  .badge-green { background: var(--green-dim); color: var(--green); }
  .badge-yellow { background: rgba(251,191,36,0.12); color: var(--yellow); }
  .badge-red { background: rgba(239,68,68,0.12); color: var(--red); }
  .row-green { background: rgba(0,230,118,0.03); }
  .row-yellow { background: rgba(251,191,36,0.03); }
  .row-red { background: rgba(239,68,68,0.03); }
  .num { text-align: right; font-family: 'Inter', monospace; }
  .loading { text-align: center; padding: 60px; color: var(--text-dim); }
  .count { color: var(--text-dim); font-size: 14px; margin-bottom: 16px; }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand">⬡ Margin Runner <small>$2k/wk target</small></div>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/buys" class="active">Buys</a>
    <a href="/sales">Sales</a>
  </div>
</nav>
<div class="container">
  <h1>Deal Pipeline</h1>
  <p class="subtitle">All sourced deals ranked by net margin.</p>
  <div class="filters">
    <input type="text" id="search" placeholder="Search products..." oninput="filter()">
  </div>
  <div id="count" class="count"></div>
  <div id="table"><div class="loading">Loading deals...</div></div>
</div>

<script>
const db = window.__dealData = [];

function badge(m) {
  if (m == null) return '<span class="badge badge-red">—</span>';
  if (m >= 40) return '<span class="badge badge-green">'+m.toFixed(1)+'%</span>';
  if (m >= 30) return '<span class="badge badge-yellow">'+m.toFixed(1)+'%</span>';
  return '<span class="badge badge-red">'+m.toFixed(1)+'%</span>';
}
function usd(v) { return v != null ? '$' + Number(v).toFixed(2) : '—'; }
function rowClass(m) {
  if (m >= 40) return 'row-green';
  if (m >= 30) return 'row-yellow';
  return 'row-red';
}

function render(deals) {
  let html = '<table><thead><tr><th>Rank</th><th>Product</th><th>Cost</th><th>Sell Price</th><th>Fees</th><th>Net Profit</th><th>Net Margin</th><th>Platform</th><th>Source</th><th>Status</th></tr></thead><tbody>';
  deals.forEach((t, i) => {
    html += `<tr class="${rowClass(t.estimated_margin_percent)}">
      <td>${i+1}</td>
      <td>${t.product_name}</td>
      <td class="num">${usd(t.sourcing_cost)}</td>
      <td class="num">${usd(t.market_price)}</td>
      <td class="num">${usd(t.estimated_fees)}</td>
      <td class="num">${usd(t.estimated_margin)}</td>
      <td>${badge(t.estimated_margin_percent)}</td>
      <td>${t.platform || '—'}</td>
      <td>${t.source_website || '—'}</td>
      <td>${t.status || 'new'}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('table').innerHTML = html;
  document.getElementById('count').textContent = deals.length + ' deals';
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  render(db.filter(d => d.product_name.toLowerCase().includes(q)));
}

async function load() {
  const r = await fetch('/api/deals');
  const j = await r.json();
  db.length = 0; db.push(...j.deals);
  render(db);
}
load();
</script>
</body>
</html>
